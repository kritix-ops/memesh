# Nightly encrypted backup of the production Neon database to Cloudflare R2.
#
# Why this exists: Neon's point-in-time restore protects against bad writes,
# but not against losing access to the Neon account itself (compromise,
# billing lockout, vendor incident). This job keeps an independent encrypted
# copy outside the Neon + Vercel world.
#
# One-time setup (repo Settings -> Secrets and variables -> Actions,
# or `gh secret set <NAME>`):
#   BACKUP_DATABASE_URL   production DATABASE_URL (ideally a dedicated
#                         read-only Postgres role, not the app's role)
#   BACKUP_PASSPHRASE     long random string; keep a copy in the password
#                         manager - without it every backup is unreadable
#   R2_ENDPOINT           https://<account-id>.r2.cloudflarestorage.com
#   R2_ACCESS_KEY_ID      R2 API token key (Object Read & Write, scoped to the bucket)
#   R2_SECRET_ACCESS_KEY  R2 API token secret
#   R2_BUCKET             bucket name, e.g. memesh-db-backups
#
# Retention: set a lifecycle rule on the bucket (R2 dashboard -> bucket ->
# Settings -> Object lifecycle) to delete objects older than 30 days.
# This job only ever adds files; it never deletes.
#
# Restore drill (a backup that was never restored is a hope, not a backup):
#   aws s3 cp "s3://<bucket>/<file>" . --endpoint-url <R2_ENDPOINT>
#   openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 -in <file> \
#     -out memesh.dump -pass pass:<passphrase>
#   pg_restore -d <scratch-branch-database-url> --no-owner memesh.dump
#
# Note: GitHub disables cron workflows after 60 days without repo activity
# and emails the repo owner when a scheduled run fails.
name: db-backup

on:
  schedule:
    - cron: '30 1 * * *' # 01:30 UTC = 04:30 Israel, quiet hours
  workflow_dispatch: {} # manual runs for testing / pre-migration snapshots

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install Postgres 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y -qq postgresql-client-17

      - name: Dump and encrypt
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          FILE="memesh-$(date -u +%Y-%m-%d).dump.enc"
          echo "FILE=$FILE" >> "$GITHUB_ENV"
          pg_dump "$DATABASE_URL" --format=custom --no-owner \
            | openssl enc -aes-256-cbc -pbkdf2 -iter 200000 -salt \
                -pass env:BACKUP_PASSPHRASE -out "$FILE"
          SIZE=$(stat -c%s "$FILE")
          echo "[db-backup dump] wrote $FILE ($SIZE bytes)"
          # A near-empty dump means auth failed or the schema is gone -
          # fail loudly instead of uploading garbage.
          if [ "$SIZE" -lt 10000 ]; then
            echo "[db-backup dump] file suspiciously small, aborting"
            exit 1
          fi

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "$FILE" "s3://${{ secrets.R2_BUCKET }}/$FILE" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          echo "[db-backup upload] done: $FILE"
